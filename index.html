<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS // Advanced Tactical HUD</title>
    <!-- Import WebLLM for the local browser fallback model -->
    <script type="module">
        import * as webllm from "https://esm.run/@webllm/javascript-component";
        window.webllm = webllm;
    </script>
    <style>
        :root {
            --bg-color: #050b14;
            --grid-color: rgba(0, 162, 255, 0.05);
            --accent-glow: #00e5ff;
            --accent-dim: #005f73;
            --text-main: #d0f4de;
            --panel-bg: rgba(10, 25, 47, 0.7);
            --panel-border: rgba(0, 229, 255, 0.2);
            --alert-color: #ff3366;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Asymmetric HUD Layout */
        .hud-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            grid-template-rows: auto 1fr;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-dim);
            padding-bottom: 10px;
        }

        .hud-title h1 {
            font-size: 1.8rem;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .system-status {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
        }

        .status-node {
            padding: 4px 8px;
            border: 1px solid var(--panel-border);
            background: rgba(0,0,0,0.4);
        }

        .status-node.active {
            color: var(--accent-glow);
            border-color: var(--accent-glow);
            box-shadow: inset 0 0 5px rgba(0, 229, 255, 0.3);
        }

        .status-node.alert {
            color: var(--alert-color);
            border-color: var(--alert-color);
        }

        /* Left Column: Core Interactions */
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            padding: 15px;
            position: relative;
            backdrop-filter: blur(4px);
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 10px; height: 10px;
            border-top: 2px solid var(--accent-glow);
            border-left: 2px solid var(--accent-glow);
        }

        .panel-header {
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: var(--accent-glow);
            display: flex;
            justify-content: space-between;
        }

        /* AI Interactive Terminal */
        .terminal-log {
            height: 250px;
            overflow-y: auto;
            border: 1px solid rgba(0, 229, 255, 0.1);
            background: rgba(0, 5, 15, 0.6);
            padding: 10px;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .msg { margin-bottom: 4px; }
        .msg.user { color: #80ffdb; }
        .msg.jarvis { color: var(--accent-glow); }
        .msg.sys { color: #aaa; font-style: italic; }

        .controls-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button, select, input {
            background: rgba(0, 40, 80, 0.5);
            border: 1px solid var(--accent-dim);
            color: var(--text-main);
            padding: 8px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--accent-dim);
            color: #fff;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        button.active {
            background: #00e5ff;
            color: #000;
            font-weight: bold;
        }

        input[type="text"], select {
            flex-grow: 1;
            background: rgba(0,0,0,0.5);
        }

        /* Sketchpad Canvas Matrix */
        .canvas-container {
            position: relative;
            width: 100%;
            height: 300px;
            background-color: #02060c;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 10px 10px;
            border: 1px solid rgba(0, 229, 255, 0.1);
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            cursor: crosshair;
        }

        /* Right Column: Feeds & Memory Profile */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-feed-wrapper {
            width: 100%;
            height: 200px;
            background: #000;
            border: 1px solid rgba(0, 229, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror view */
            opacity: 0.7;
        }

        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 1px solid rgba(255,0,0,0.2);
            pointer-events: none;
            box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.15);
        }

        .profile-form {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .profile-form label {
            font-size: 0.75rem;
            color: var(--accent-glow);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="hud-container">
    <header>
        <div class="hud-title">
            <h1>J.A.R.V.I.S.</h1>
        </div>
        <div class="system-status">
            <div id="status-ext" class="status-node">EXT: DISCONNECTED</div>
            <div id="status-mic" class="status-node">MIC: OFF</div>
            <div id="status-cam" class="status-node">CAM: OFF</div>
            <div id="status-brain" class="status-node">BRAIN: READY</div>
        </div>
    </header>

    <!-- Main Workspace (Left) -->
    <main class="main-panel">
        <!-- Terminal AI Deck -->
        <div class="panel">
            <div class="panel-header">
                <span>Core Interface Matrix</span>
                <span id="thinking-indicator" style="color: var(--accent-glow); display:none;">LOGIC ROUTING...</span>
            </div>
            <div class="terminal-log" id="terminalLog">
                <div class="msg sys">System initialized. Awaiting orders, sir.</div>
            </div>
            <div class="controls-row">
                <button id="btnToggleMic">PUSH TO TALK</button>
                <button id="btnContinuousMic">CONTS LISTENING: OFF</button>
                <input type="text" id="txtInput" placeholder="Enter manual command sequence...">
                <button id="btnSend">EXECUTE</button>
            </div>
        </div>

        <!-- Cutting Mat Workspace / Sketchpad -->
        <div class="panel">
            <div class="panel-header">Tactical Grid Overlay (Sketchpad)</div>
            <div class="canvas-container">
                <canvas id="sketchpad"></canvas>
            </div>
            <div class="controls-row" style="margin-top:10px;">
                <button id="btnPenMode" class="active">PEN</button>
                <button id="btnEraserMode">ERASER</button>
                <button id="btnClearCanvas">PURGE GRID</button>
            </div>
        </div>
    </main>

    <!-- Contextual Datadecks (Right) -->
    <aside class="side-panel">
        <!-- Camera Subsystem -->
        <div class="panel">
            <div class="panel-header">
                <span>Visual Matrix Feed</span>
                <button id="btnToggleCam" style="padding: 2px 6px; font-size: 0.7rem;">TOGGLE</button>
            </div>
            <div class="video-feed-wrapper">
                <video id="videoFeed" autoplay playsinline></video>
                <div class="video-overlay"></div>
            </div>
        </div>

        <!-- System Configuration & Identity Registry -->
        <div class="panel">
            <div class="panel-header">Identity Matrix (Local Memory)</div>
            <div class="profile-form">
                <label>User Variant Name</label>
                <input type="text" id="profName" value="Sir">
                
                <label>Operational Preferences</label>
                <input type="text" id="profPrefs" placeholder="e.g. Focus on cybersecurity code execution">
                
                <label>Cognitive Node (LLM Engine)</label>
                <select id="engineSelect">
                    <option value="groq">Groq Cloud Engine (Cloud SaaS)</option>
                    <option value="gemini">Gemini Core (Cloud SaaS)</option>
                    <option value="webllm">WebLLM Matrix (100% Local Browser Engine)</option>
                </select>

                <label>Secure API Access Key</label>
                <input type="password" id="apiKeyInput" placeholder="Paste access credentials here...">
                
                <button id="btnSaveProfile" style="margin-top:5px; width:100%;">COMMIT CHANGES</button>
            </div>
        </div>
    </aside>
</div>

<script>
    // Global App Configuration & State Machine
    const state = {
        isListening: false,
        isContinuous: false,
        isCameraOn: false,
        isDrawing: false,
        drawMode: 'draw', // 'draw' or 'erase'
        recognition: null,
        localModelEngine: null,
        extensionId: "gkkjbhgffbofpajlbcmfomkclnkcongg", // Set matching your manifest
        profile: {
            name: "Sir",
            preferences: "",
            engine: "groq",
            apiKey: ""
        }
    };

    // --- DOM Elements ---
    const terminalLog = document.getElementById('terminalLog');
    const txtInput = document.getElementById('txtInput');
    const btnSend = document.getElementById('btnSend');
    const btnToggleMic = document.getElementById('btnToggleMic');
    const btnContinuousMic = document.getElementById('btnContinuousMic');
    const btnToggleCam = document.getElementById('btnToggleCam');
    const videoFeed = document.getElementById('videoFeed');
    const sketchpad = document.getElementById('sketchpad');
    const ctx = sketchpad.getContext('2d');
    
    // Status Elements
    const statusExt = document.getElementById('status-ext');
    const statusMic = document.getElementById('status-mic');
    const statusCam = document.getElementById('status-cam');
    const statusBrain = document.getElementById('status-brain');
    const thinkingIndicator = document.getElementById('thinking-indicator');

    // --- Core Lifecycle Logic ---
    window.addEventListener('DOMContentLoaded', () => {
        loadProfile();
        initSpeechRecognition();
        initSketchpad();
        checkChromeExtension();
        
        // Setup UI Event binding
        btnSend.addEventListener('click', handleManualInput);
        txtInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') handleManualInput(); });
        btnToggleMic.addEventListener('mousedown', startVoiceCapture);
        btnToggleMic.addEventListener('mouseup', stopVoiceCapture);
        btnContinuousMic.addEventListener('click', toggleContinuousListening);
        btnToggleCam.addEventListener('click', toggleCameraMatrix);
        document.getElementById('btnSaveProfile').addEventListener('click', saveProfile);
        
        document.getElementById('btnPenMode').addEventListener('click', () => setDrawMode('draw'));
        document.getElementById('btnEraserMode').addEventListener('click', () => setDrawMode('erase'));
        document.getElementById('btnClearCanvas').addEventListener('click', clearCanvasGrid);
    });

    // --- Local Profile Storage Systems ---
    function loadProfile() {
        const saved = localStorage.getItem('jarvis_profile');
        if (saved) {
            try {
                state.profile = JSON.parse(saved);
                document.getElementById('profName').value = state.profile.name || "Sir";
                document.getElementById('profPrefs').value = state.profile.preferences || "";
                document.getElementById('engineSelect').value = state.profile.engine || "groq";
                document.getElementById('apiKeyInput').value = state.profile.apiKey || "";
            } catch(e) { logTerminal("sys", "Failed loading directory structure profiles."); }
        }
    }

    function saveProfile() {
        state.profile.name = document.getElementById('profName').value;
        state.profile.preferences = document.getElementById('profPrefs').value;
        state.profile.engine = document.getElementById('engineSelect').value;
        state.profile.apiKey = document.getElementById('apiKeyInput').value;
        
        localStorage.setItem('jarvis_profile', JSON.stringify(state.profile));
        logTerminal("sys", "Identity metrics profile updated successfully.");
        
        if (state.profile.engine === 'webllm') {
            initWebLLM();
        }
    }

    function logTerminal(sender, text) {
        const line = document.createElement('div');
        line.className = `msg ${sender}`;
        line.innerText = `${sender.toUpperCase()}: ${text}`;
        terminalLog.appendChild(line);
        terminalLog.scrollTop = terminalLog.scrollHeight;
    }

    // --- Web Speech API Engines ---
    function initSpeechRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            logTerminal("sys", "Web Speech Subsystem missing natively in this browser shell.");
            return;
        }
        state.recognition = new SpeechRecognition();
        state.recognition.continuous = false;
        state.recognition.interimResults = false;
        state.recognition.lang = 'en-US';

        state.recognition.onstart = () => {
            statusMic.innerText = "MIC: LISTENING";
            statusMic.classList.add('active');
        };

        state.recognition.onend = () => {
            if (!state.isContinuous) {
                statusMic.innerText = "MIC: OFF";
                statusMic.classList.remove('active');
            } else if (state.isListening) {
                state.recognition.start(); // Keep continuous live
            }
        };

        state.recognition.onresult = (event) => {
            const resultText = event.results[0][0].transcript;
            logTerminal("user", resultText);
            processQuery(resultText);
        };

        state.recognition.onerror = (err) => {
            if (err.error !== 'no-speech') {
                logTerminal("sys", `Audio capture warning: ${err.error}`);
            }
        };
    }

    function startVoiceCapture() {
        if (!state.recognition || state.isContinuous) return;
        state.isListening = true;
        try { state.recognition.start(); } catch(e){}
    }

    function stopVoiceCapture() {
        if (!state.recognition || state.isContinuous) return;
        state.isListening = false;
        setTimeout(() => { try { state.recognition.stop(); } catch(e){} }, 400);
    }

    function toggleContinuousListening() {
        if (!state.recognition) return;
        state.isContinuous = !state.isContinuous;
        if (state.isContinuous) {
            state.isListening = true;
            btnContinuousMic.classList.add('active');
            btnContinuousMic.innerText = "CONTS LISTENING: ON";
            try { state.recognition.start(); } catch(e){}
        } else {
            state.isListening = false;
            btnContinuousMic.classList.remove('active');
            btnContinuousMic.innerText = "CONTS LISTENING: OFF";
            try { state.recognition.stop(); } catch(e){}
            statusMic.innerText = "MIC: OFF";
            statusMic.classList.remove('active');
        }
    }

    function speakOutboundText(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel(); // Terminate cascading speech lines
        const utterance = new window.SpeechSynthesisUtterance(text);
        
        // Seek typical natural vocal variants if loaded in host OS
        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(v => v.name.includes('Google US English') || v.name.includes('Natural'));
        if(preferredVoice) utterance.voice = preferredVoice;
        
        utterance.rate = 1.05;
        utterance.pitch = 0.95;
        window.speechSynthesis.speak(utterance);
    }

    // --- Processing Pipeline / Core AI Interface Rules ---
    function handleManualInput() {
        const val = txtInput.value.trim();
        if(!val) return;
        logTerminal("user", val);
        txtInput.value = "";
        processQuery(val);
    }

    async function processQuery(query) {
        thinkingIndicator.style.display = "inline";
        statusBrain.innerText = "BRAIN: PROCESSING";
        statusBrain.classList.add('active');

        // Check if query targets local automation routing via Extension
        if (interceptAutomationIntent(query)) {
            thinkingIndicator.style.display = "none";
            statusBrain.innerText = "BRAIN: READY";
            statusBrain.classList.remove('active');
            return;
        }

        // Base structural system contextual prompt
        const systemPrompt = `You are JARVIS, an advanced, ultra-intelligent, and deeply loyal AI assistant. 
Always address the user as "sir". Keep responses direct, helpful, technically precise, and highly concise. 
User Context Profiles: Name=${state.profile.name}. Preferences=${state.profile.preferences}.`;

        let reply = "";
        try {
            if (state.profile.engine === 'groq') {
                reply = await callGroqAPI(systemPrompt, query);
            } else if (state.profile.engine === 'gemini') {
                reply = await callGeminiAPI(systemPrompt, query);
            } else if (state.profile.engine === 'webllm') {
                reply = await callWebLLMMatrix(systemPrompt, query);
            }
        } catch (err) {
            reply = "Apologies, sir. I encountered a breakdown in my API communications matrix.";
            console.error(err);
        }

        logTerminal("jarvis", reply);
        speakOutboundText(reply);
        
        thinkingIndicator.style.display = "none";
        statusBrain.innerText = "BRAIN: READY";
        statusBrain.classList.remove('active');
    }

    // --- API Integrations ---
    async function callGroqAPI(system, user) {
        if (!state.profile.apiKey) return "API Credentials missing, sir. Please supply access parameters.";
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${state.profile.apiKey}`
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [
                    { role: "system", content: system },
                    { role: "user", content: user }
                ],
                max_tokens: 150
            })
        });
        const data = await response.json();
        return data.choices[0].message.content.trim();
    }

    async function callGeminiAPI(system, user) {
        if (!state.profile.apiKey) return "API Credentials missing, sir. Please supply access parameters.";
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${state.profile.apiKey}`;
        const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `${system}\n\nUser Request: ${user}` }] }],
                generationConfig: { maxOutputTokens: 150 }
            })
        });
        const data = await response.json();
        return data.candidates[0].content.parts[0].text.trim();
    }

    // --- Local WebLLM Engine Fallback ---
    async function initWebLLM() {
        if (!window.webllm) return;
        if (state.localModelEngine) return; // Loaded already
        
        logTerminal("sys", "Downloading browser native AI weights (this may require some time)...");
        try {
            state.localModelEngine = new window.webllm.CreateEngine();
            // Using compact model for rapid processing speeds directly inside client hardware VRAM/RAM
            await state.localModelEngine.reload("Llama-3-8B-Instruct-q4f32_1-1k");
            logTerminal("sys", "In-memory architecture weights allocated successfully. Local engine online.");
        } catch(e) {
            logTerminal("sys", "Error pulling web assembly compiler runtimes.");
            state.localModelEngine = null;
        }
    }

    async function callWebLLMMatrix(system, user) {
        if (!state.localModelEngine) {
            await initWebLLM();
            if (!state.localModelEngine) return "Local hardware model generation stack failed initializing, sir.";
        }
        const inputMessages = [
            { role: "system", content: system },
            { role: "user", content: user }
        ];
        const reply = await state.localModelEngine.chat.completions.create({
            messages: inputMessages,
            max_tokens: 100
        });
        return reply.choices[0].message.content;
    }

    // --- Browser Control Extension Router Integration ---
    function checkChromeExtension() {
        if (!window.chrome || !chrome.runtime) return;
        // Broadcast test handshake packet to background systems
        chrome.runtime.sendMessage(state.extensionId, { action: "PING" }, response => {
            if (chrome.runtime.lastError || !response) {
                statusExt.innerText = "EXT: DISCONNECTED";
                statusExt.classList.remove('active');
            } else if (response.status === "PONG") {
                statusExt.innerText = "EXT: ONLINE";
                statusExt.classList.add('active');
            }
        });
    }

    function interceptAutomationIntent(query) {
        const text = query.toLowerCase();
        let targetAction = null;
        let payload = {};

        if (text.includes("open tab") || text.includes("browse to")) {
            targetAction = "OPEN_TAB";
            const matches = text.match(/to\s+(https?:\/\/[^\s]+|[a-z0-9.-]+\.[a-z]{2,})/i);
            let url = matches ? matches[1] : "https://google.com";
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            payload.url = url;
        } else if (text.includes("close tab") || text.includes("terminate window")) {
            targetAction = "CLOSE_TAB";
        } else if (text.includes("get tab details") || text.includes("read tab")) {
            targetAction = "GET_TAB_INFO";
        }

        if (targetAction && window.chrome && chrome.runtime) {
            chrome.runtime.sendMessage(state.extensionId, { action: targetAction, ...payload }, (res) => {
                if (chrome.runtime.lastError) {
                    logTerminal("jarvis", "Automation relays unreachable, sir. Ensure extension verification completes.");
                    speakOutboundText("Automation relays unreachable, sir.");
                } else if (res && res.success) {
                    let logMsg = res.message || "Sequence executed cleanly.";
                    if (targetAction === "GET_TAB_INFO") {
                        logMsg = `Target active trace is titled: "${res.title}" at routing location: ${res.url}`;
                    }
                    logTerminal("jarvis", logMsg);
                    speakOutboundText(logMsg);
                }
            });
            return true;
        }
        return false;
    }

    // --- Hardware Subsystems Layer (Camera) ---
    async function toggleCameraMatrix() {
        if (state.isCameraOn) {
            const tracks = videoFeed.srcObject ? videoFeed.srcObject.getTracks() : [];
            tracks.forEach(track => track.stop());
            videoFeed.srcObject = null;
            state.isCameraOn = false;
            statusCam.innerText = "CAM: OFF";
            statusCam.classList.remove('active');
            logTerminal("sys", "Optics matrix disabled.");
        } else {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                videoFeed.srcObject = stream;
                state.isCameraOn = true;
                statusCam.innerText = "CAM: FEED_LIVE";
                statusCam.classList.add('active');
                logTerminal("sys", "Optics feed active, security perimeter scanned.");
            } catch(e) {
                logTerminal("sys", "Hardware permissions refused for optical systems.");
            }
        }
    }

    // --- Canvas Matrix Layer (Tactical Sketchpad) ---
    function initSketchpad() {
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Drawing Event Hooks
        sketchpad.addEventListener('mousedown', startDrawing);
        sketchpad.addEventListener('mousemove', drawStroke);
        sketchpad.addEventListener('mouseup', stopDrawing);
        sketchpad.addEventListener('mouseout', stopDrawing);

        // Touch Devices Setup
        sketchpad.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e.touches[0]); });
        sketchpad.addEventListener('touchmove', (e) => { e.preventDefault(); drawStroke(e.touches[0]); });
        sketchpad.addEventListener('touchend', stopDrawing);
    }

    function resizeCanvas() {
        const rect = sketchpad.parentElement.getBoundingClientRect();
        sketchpad.width = rect.width;
        sketchpad.height = 300;
        clearCanvasGrid();
    }

    function clearCanvasGrid() {
        ctx.fillStyle = '#02060c';
        ctx.fillRect(0, 0, sketchpad.width, sketchpad.height);
        logTerminal("sys", "Workspace vector plane cleared.");
    }

    function setDrawMode(mode) {
        state.drawMode = mode;
        document.getElementById('btnPenMode').className = mode === 'draw' ? 'active' : '';
        document.getElementById('btnEraserMode').className = mode === 'erase' ? 'active' : '';
    }

    function startDrawing(e) {
        state.isDrawing = true;
        ctx.beginPath();
        const rect = sketchpad.getBoundingClientRect();
        ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    }

    function drawStroke(e) {
        if (!state.isDrawing) return;
        const rect = sketchpad.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        
        ctx.lineWidth = state.drawMode === 'erase' ? 24 : 2;
        ctx.strokeStyle = state.drawMode === 'erase' ? '#02060c' : '#00e5ff';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
    }

    function stopDrawing() {
        state.isDrawing = false;
    }
</script>
